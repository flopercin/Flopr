<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flopr</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script>
        window.handleCredentialResponse = async (response) => {
            try {
                console.log("Google Sign-In Response:", response);
                const idToken = response.credential;
                const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
                const result = await firebase.auth().signInWithCredential(credential);
                console.log("Sign-in result:", result);
                document.getElementById('authModal').style.display = 'none';
            } catch (error) {
                console.error("Ошибка входа:", error);
                alert("Ошибка входа: " + error.message);
            }
        };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f0fff0;
            color: #333;
        }
        .header {
            background-color: #4caf50;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            max-width: 200px;
            justify-content: flex-end;
        }
        .user-text {
            color: white;
            font-size: 10px;
            max-width: 100px;
            white-space: normal;
            text-align: right;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #ccc;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }
        .main-content {
            margin-top: 70px;
            margin-bottom: 60px;
            padding: 20px;
            min-height: calc(100vh - 130px);
        }
        .footer {
            background-color: #4caf50;
            padding: 10px 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 10px;
        }
        .footer a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }
        .plus-btn {
            border: 2px solid white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
        }
        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 400px;
            margin: 15% auto;
            border-radius: 10px;
            overflow: hidden;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background-color: #f5f5f5;
            color: #333;
        }
        .tab.active {
            background-color: white;
            color: #4caf50;
            border-bottom: 2px solid #4caf50;
        }
        .tab-content {
            padding: 20px;
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .logout-btn {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
        .profile-modal-content {
            padding: 20px;
            text-align: center;
        }
        .profile-modal-content h2 {
            margin-bottom: 20px;
            color: #4caf50;
        }
        .profile-modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin: 10px auto;
            border: 2px solid #4caf50;
        }
        .avatar-input {
            margin: 10px 0;
        }
        .save-profile-btn {
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .save-profile-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .error-message {
            color: #ff4444;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Flopr</h1>
        <div class="user-info" onclick="openModal()">
            <span class="user-text" id="userText">Зарегистрируйтесь или войдите в аккаунт бесплатно!</span>
            <div class="avatar" id="userAvatar"></div>
            <button class="logout-btn" id="logoutBtn" style="display: none;">Выйти</button>
        </div>
    </header>
    <main class="main-content"></main>
    <footer class="footer">
        <a href="#"><i class="fas fa-home"></i></a>
        <a href="#"><i class="fas fa-comments"></i></a>
        <a href="#" class="plus-btn"><i class="fas fa-plus"></i></a>
        <a href="#"><i class="fas fa-search"></i></a>
        <a href="#"><i class="fas fa-cog"></i></a>
    </footer>
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">Вход</div>
                <div class="tab" onclick="showTab('register')">Регистрация</div>
            </div>
            <div class="tab-content active" id="login">
                <div id="g_id_onload"
                     data-client_id="313128941793-nt4aclh5pca02d3p651v9r8fb3cqtsdh.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>
            <div class="tab-content" id="register">
                <div id="g_id_onload"
                     data-client_id="313128941793-nt4aclh5pca02d3p651v9r8fb3cqtsdh.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>
        </div>
    </div>
    <div class="modal" id="profileModal">
        <div class="modal-content profile-modal-content">
            <h2>Настройка профиля</h2>
            <input type="text" id="profileName" placeholder="Ваше имя">
            <input type="text" id="profileUsername" placeholder="Юзернейм (a-z, 0-9, max 20)">
            <div class="avatar-preview" id="avatarPreview"></div>
            <input type="file" id="avatarInput" class="avatar-input" accept="image/*">
            <button class="save-profile-btn" id="saveProfileBtn" disabled>Сохранить</button>
            <p class="error-message" id="usernameError"></p>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmv0bj3l2fDUQe6-xzlkpEu5r_Qdbpm7w",
            authDomain: "floperin-559d7.firebaseapp.com",
            projectId: "floperin-559d7",
            storageBucket: "floperin-559d7.firebasestorage.app",
            messagingSenderId: "313128941793",
            appId: "1:313128941793:web:2a33815852477fa136dfa0",
            measurementId: "G-LCZJLT5JJE"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dzhjztqsd/image/upload';
        const CLOUDINARY_PRESET = 'my_flopr';
        function updateUI(user) {
            const userText = document.getElementById('userText');
            const userAvatar = document.getElementById('userAvatar');
            const logoutBtn = document.getElementById('logoutBtn');
            if (user) {
                userText.textContent = user.displayName || 'Пользователь';
                userAvatar.style.backgroundImage = `url(${user.photoURL})`;
                logoutBtn.style.display = 'block';
            } else {
                userText.textContent = 'Зарегистрируйтесь или войдите в аккаунт бесплатно!';
                userAvatar.style.backgroundImage = '';
                userAvatar.style.backgroundColor = '#ccc';
                logoutBtn.style.display = 'none';
            }
        }
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut()
                .then(() => {
                    updateUI(null);
                })
                .catch((error) => {
                    console.error("Ошибка выхода:", error);
                });
        });
        auth.onAuthStateChanged(async (user) => {
            console.log("Auth state changed:", user);
            updateUI(user);
            if (user) {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    document.getElementById('profileModal').style.display = 'block';
                    const profileName = document.getElementById('profileName');
                    const profileUsername = document.getElementById('profileUsername');
                    const avatarPreview = document.getElementById('avatarPreview');
                    const avatarInput = document.getElementById('avatarInput');
                    const saveProfileBtn = document.getElementById('saveProfileBtn');
                    const usernameError = document.getElementById('usernameError');
                    profileName.value = user.displayName || '';
                    profileUsername.value = user.displayName ? user.displayName.replace(/[^a-zA-Z0-9]/g, '').toLowerCase().slice(0, 20) : '';
                    let selectedAvatar = user.photoURL || '';
                    avatarPreview.style.backgroundImage = `url(${selectedAvatar})`;
                    avatarInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            if (file.size > 3000000) {
                                usernameError.textContent = 'Изображение не должно превышать 3 МБ';
                                saveProfileBtn.disabled = true;
                                return;
                            }
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                selectedAvatar = event.target.result;
                                avatarPreview.style.backgroundImage = `url(${selectedAvatar})`;
                                saveProfileBtn.disabled = false;
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                    let isUsernameValid = false;
                    profileUsername.addEventListener('input', async () => {
                        const username = profileUsername.value.trim().toLowerCase();
                        const usernameRegex = /^[a-zA-Z0-9]{1,20}$/;
                        if (!usernameRegex.test(username)) {
                            usernameError.textContent = 'Только английские буквы и цифры, до 20 символов';
                            isUsernameValid = false;
                            saveProfileBtn.disabled = true;
                            return;
                        }
                        const usernameDoc = await db.collection('usernames').doc(username).get();
                        if (usernameDoc.exists) {
                            usernameError.textContent = 'Этот юзернейм уже занят';
                            isUsernameValid = false;
                            saveProfileBtn.disabled = true;
                        } else {
                            usernameError.textContent = '';
                            isUsernameValid = true;
                            saveProfileBtn.disabled = !selectedAvatar;
                        }
                    });
                    saveProfileBtn.addEventListener('click', async () => {
                        if (!isUsernameValid || !selectedAvatar) return;
                        const name = profileName.value.trim();
                        const username = profileUsername.value.trim().toLowerCase();
                        if (!name || !username) {
                            usernameError.textContent = 'Заполните все поля';
                            return;
                        }
                        try {
                            let photoURL = user.photoURL;
                            if (avatarInput.files[0]) {
                                const formData = new FormData();
                                formData.append('file', avatarInput.files[0]);
                                formData.append('upload_preset', CLOUDINARY_PRESET);
                                const response = await fetch(CLOUDINARY_URL, {
                                    method: 'POST',
                                    body: formData
                                });
                                const data = await response.json();
                                if (data.secure_url) {
                                    photoURL = data.secure_url;
                                } else {
                                    throw new Error('Ошибка загрузки аватарки');
                                }
                            }
                            await db.collection('users').doc(user.uid).set({
                                displayName: name,
                                email: user.email,
                                photoURL: photoURL,
                                username: username,
                                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });
                            await db.collection('usernames').doc(username).set({
                                uid: user.uid
                            });
                            updateUI({
                                displayName: name,
                                photoURL: photoURL
                            });
                            document.getElementById('profileModal').style.display = 'none';
                        } catch (error) {
                            console.error("Ошибка сохранения профиля:", error);
                            usernameError.textContent = 'Ошибка сохранения: ' + error.message;
                        }
                    });
                }
            }
        });
        function openModal() {
            console.log("openModal called");
            if (auth && !auth.currentUser) {
                document.getElementById('authModal').style.display = 'block';
            }
        }
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        window.onclick = function(event) {
            if (event.target == document.getElementById('authModal')) {
                document.getElementById('authModal').style.display = 'none';
            }
            if (event.target == document.getElementById('profileModal')) {
                document.getElementById('profileModal').style.display = 'none';
            }
        }
    </script>
</body>
            </html>
