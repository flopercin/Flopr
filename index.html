<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flopr</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js"></script>
    <style>
        /* Твой текущий CSS без изменений */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0fff0;
            color: #333;
        }

        .header {
            background-color: #4caf50;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            color: white;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .user-text {
            color: white;
            font-size: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #ccc;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }

        .main-content {
            margin-top: 70px;
            margin-bottom: 60px;
            padding: 20px;
        }

        .footer {
            background-color: #4caf50;
            padding: 10px 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .footer a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
        }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 400px;
            margin: 15% auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background-color: #f5f5f5;
            color: #333;
        }

        .tab.active {
            background-color: white;
            color: #4caf50;
            border-bottom: 2px solid #4caf50;
        }

        .tab-content {
            padding: 20px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .logout-btn {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Flopr</h1>
        <div class="user-info" onclick="openModal()">
            <span class="user-text" id="userText">Зарегистрируйтесь или войдите в аккаунт бесплатно!</span>
            <div class="avatar" id="userAvatar"></div>
            <button class="logout-btn" id="logoutBtn" style="display: none;">Выйти</button>
        </div>
    </header>

    <main class="main-content">
    </main>

    <footer class="footer">
        <a href="#"><i class="fas fa-home"></i></a>
        <a href="#"><i class="fas fa-comments"></i></a>
        <a href="#"><i class="fas fa-search"></i></a>
        <a href="#"><i class="fas fa-cog"></i></a>
    </footer>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">Вход</div>
                <div class="tab" onclick="showTab('register')">Регистрация</div>
            </div>
            <div class="tab-content active" id="login">
                <button class="google-btn" onclick="signInWithGoogle()"><i class="fab fa-google"></i> Войти через Google</button>
            </div>
            <div class="tab-content" id="register">
                <button class="google-btn" onclick="signInWithGoogle()"><i class="fab fa-google"></i> Зарегистрироваться через Google</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyCmv0bj3l2fDUQe6-xzlkpEu5r_Qdbpm7w",
            authDomain: "floperin-559d7.firebaseapp.com",
            projectId: "floperin-559d7",
            storageBucket: "floperin-559d7.firebasestorage.app",
            messagingSenderId: "313128941793",
            appId: "1:313128941793:web:2a33815852477fa136dfa0",
            measurementId: "G-LCZJLT5JJE"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Вход через Google
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    saveUserToFirestore(user);
                    updateUI(user);
                    document.getElementById('authModal').style.display = 'none';
                })
                .catch((error) => {
                    console.error("Ошибка входа:", error);
                    alert("Ошибка входа: " + error.message);
                });
        }

        // Сохранение данных пользователя в Firestore
        function saveUserToFirestore(user) {
            db.collection("users").doc(user.uid).set({
                displayName: user.displayName,
                email: user.email,
                photoURL: user.photoURL,
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true })
                .then(() => console.log("Пользователь сохранен в Firestore"))
                .catch((error) => console.error("Ошибка сохранения в Firestore:", error));
        }

        // Обновление UI после входа
        function updateUI(user) {
            const userText = document.getElementById('userText');
            const userAvatar = document.getElementById('userAvatar');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user) {
                userText.textContent = user.displayName || 'Пользователь';
                userAvatar.style.backgroundImage = `url(${user.photoURL})`;
                logoutBtn.style.display = 'block';
            } else {
                userText.textContent = 'Зарегистрируйтесь или войдите в аккаунт бесплатно!';
                userAvatar.style.backgroundImage = '';
                userAvatar.style.backgroundColor = '#ccc';
                logoutBtn.style.display = 'none';
            }
        }

        // Выход
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut()
                .then(() => {
                    updateUI(null);
                })
                .catch((error) => {
                    console.error("Ошибка выхода:", error);
                });
        });

        // Слушатель состояния аутентификации
        auth.onAuthStateChanged((user) => {
            updateUI(user);
        });

        // Открытие модального окна
        function openModal() {
            if (!auth.currentUser) {
                document.getElementById('authModal').style.display = 'block';
            }
        }

        // Переключение вкладок
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        // Закрытие модального окна при клике вне
        window.onclick = function(event) {
            if (event.target == document.getElementById('authModal')) {
                document.getElementById('authModal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
